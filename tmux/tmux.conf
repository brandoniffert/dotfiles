#------------------------------------------------------------------------------
#-- General -------------------------------------------------------------------
#------------------------------------------------------------------------------

# Set correct term
set -s default-terminal tmux-256color
set -as terminal-features ',*:RGB'
set -as terminal-features ',*:usstyle'

# Set extended-keys
set -g extended-keys on
set -g extended-keys-format csi-u

# Allow passthrough
set-option -g allow-passthrough on

# Set clipboard
set -s set-clipboard on

# Set correct shell
set-option -g default-shell $SHELL

# Make sure we always start at 1
set-environment -g SHLVL 1

# Resize based on smallest client viewing the session
set-option -g aggressive-resize on

# Auto renumber windows
set-option -g renumber-windows on

# Start numbering at 1
set-option -g base-index 1
set-option -g pane-base-index 1

# Renaming
set-option -g automatic-rename on
set-option -g allow-rename off

# Set window title
set-option -g set-titles on
set-option -g set-titles-string '#S:#W'

# Fast key repetition; small nonzero value avoids garbling escape sequences over slow SSH
set-option -s escape-time 10

# Increase scrollback history
set-option -g history-limit 50000

# Pass around focus events
set-option -g focus-events on

# Mouse
set-option -g mouse on

# Don't wrap searches
set-option -w -g wrap-search off

# Add : and / to the default list (" -_@") of word separators
set-option -ga word-separators :/

# Increase timeout for display-panes
set-option -g display-panes-time 5000

# Don't detach the client on destroy
set-option -g detach-on-destroy off

#------------------------------------------------------------------------------
#-- Key Bindings --------------------------------------------------------------
#------------------------------------------------------------------------------

# Use C-Space as prefix
unbind-key C-b
set-option -g prefix C-Space
bind-key Space send-prefix
bind-key C-Space last-window

# Open new window in current directory
bind-key c new-window -c "#{pane_current_path}"

# Set rename prompt to blank
bind-key , command-prompt "rename-window '%%'"

# Reload config
bind-key r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message " Reloading tmux config..."

# Kill window
bind-key q confirm-before kill-window

# Kill session
bind-key Q confirm-before kill-session

# Display panes
bind-key f display-panes

# Split panes
bind-key = split-window -h -c "#{pane_current_path}"
bind-key - split-window -c "#{pane_current_path}"

# Copy and paste
bind-key [ copy-mode -H
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle
# pbcopy on macOS; elsewhere rely on set-clipboard (OSC 52) for Linux/remote
if-shell 'command -v pbcopy' {
  bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi 'enter' send -X copy-pipe-and-cancel "pbcopy"
} {
  bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
  bind-key -T copy-mode-vi 'enter' send -X copy-selection-and-cancel
}
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

# Scroll into copy-mode with -H so the border-status indicator (not the built-in overlay) shows, matching prefix+[
bind-key -T root WheelUpPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -eH }

# Move around panes with vim motion keys
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Resize panes
bind-key -n S-Left resize-pane -L 5
bind-key -n S-Right resize-pane -R 5
bind-key -n S-Down resize-pane -D 5
bind-key -n S-Up resize-pane -U 5

# Make right pane 33% wide
bind-key ']' resize-pane -t Right -x '33%'

# Swap windows
bind-key '<' swap-window -d -t '{previous}'
bind-key '>' swap-window -d -t '{next}'

# FZF session switcher
# Switch to an existing tmux session or create one if it doesn't exist
bind-key s display-popup -T 'Sessions' -h 30% -w 30% -E 'tmux-fzf-sessions'

# FZF project session switcher
# Switch to an existing tmux project session or create one if it doesn't exist
bind-key p display-popup -T 'Project Sessions' -h 30% -w 30% -E -e TMUX_POPUP=1 'zsh -i -c tnewp'

# Lazygit popup
bind-key g display-popup -T '#{pane_current_path}' -d '#{pane_current_path}' -h 80% -w 80% -E 'lazygit'

# Terminal popup
bind-key ` display-popup -E -w 80% -h 80%

# Vim key bindings
set-option -g mode-keys vi

# Send through clear-screen
bind-key C-l send-keys 'C-l'

# Stay in copy mode on drag end
unbind-key -T copy-mode-vi MouseDragEnd1Pane

# Cancel copy mode with escape
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Use OSC-133 sequences to navigate between prompts.
bind-key o {
  copy-mode -H
  send-keys -X previous-prompt
}
bind-key -T copy-mode-vi o {
  send-keys -X previous-prompt
}
bind-key i {
  copy-mode -H
  send-keys -X next-prompt
}
bind-key -T copy-mode-vi i {
  send-keys -X next-prompt
}

# Toggle sync
bind-key A set-window-option synchronize-panes

#------------------------------------------------------------------------------
#-- Statusbar & Color ---------------------------------------------------------
#------------------------------------------------------------------------------

# Catppuccin Mocha palette
%hidden COLOR_GREEN="#a6e3a1"
%hidden COLOR_YELLOW="#f9e2af"
%hidden COLOR_OVERLAY0="#6c7086"
%hidden COLOR_OVERLAY1="#7f849c"
%hidden COLOR_OVERLAY2="#9399b2"
%hidden COLOR_SURFACE0="#313244"
%hidden COLOR_BASE="#1e1e2e"
%hidden COLOR_MANTLE="#181825"
%hidden COLOR_BLACK="#111111"
%hidden COLOR_MESSAGE_BG="#242438"
%hidden COLOR_FUZZBACK_BG="#2a2b3d"

set-option -g status-style fg=white,bg=default,none
set-option -g status-left "#{?#{m:iffy*,#{host}},#[fg=$COLOR_GREEN] #[default],}#{?client_prefix,#[fg=yellow] #[fg=$COLOR_OVERLAY1 italics],#[fg=$COLOR_OVERLAY0 italics]}#S#[default] "
set-option -g status-left-length 120
set-option -g status-right ''

# Windows
set-option -g window-status-format " #[fg=$COLOR_OVERLAY1 bg=default]#{?window_last_flag,-,#I}:#W#[default] "
set-option -g window-status-current-format " #[bold]#{?window_zoomed_flag,#[fg=yellow],#[fg=default]}#{?window_zoomed_flag,*:#W,#I:#W}#[default] "
set-option -g window-status-separator ''
set-option -g window-active-style "fg=default,bg=$COLOR_BASE,none"
set-option -g window-style "fg=default,bg=$COLOR_MANTLE,none"

# Panes
set-option -g pane-active-border-style "fg=$COLOR_SURFACE0"
set-option -g pane-border-style "fg=$COLOR_SURFACE0"
set-option -g pane-border-status bottom

# Popups
set-option -g popup-style fg=default,bg=default
set-option -g popup-border-style fg=default,bg=default

# Copy mode status
%hidden IS_COPY_MODE="#{==:#{pane_mode},copy-mode}"
%hidden COPY_MODE_MARKER="#[bold]#[align=left#,fg=black#,bg=yellow]  -- COPY --  #[default]"
%hidden COPY_MODE_LEFT="$COPY_MODE_MARKER"
%hidden HAS_SEARCH_RESULT="#{&&:#{e|>|:#{search_count},0},#{search_present}}"
%hidden RESULT_OR_RESULTS="result#{?#{==:#{search_count},1},,s}"
%hidden RESULT_COUNT_IS_PARTIAL="#{e|>|:#{search_count_partial},0}"
%hidden SEARCH_RESULT_COUNT="(#{search_count}#{?$RESULT_COUNT_IS_PARTIAL,+,} $RESULT_OR_RESULTS)"
%hidden OFFSET_FROM_TOP="#{e|-|:#{history_size},#{scroll_position}}"
%hidden COPY_MODE_LOCATION="[$OFFSET_FROM_TOP/#{history_size}]"
%hidden COPY_MODE_CENTER="#[align=centre#,bg=black]#[default]"
%hidden COPY_MODE_RIGHT="#[bold]#[align=right#,fg=black#,bg=yellow]  #{?$HAS_SEARCH_RESULT,$SEARCH_RESULT_COUNT  ,}$COPY_MODE_LOCATION  #[default]"

set-option -g pane-border-format "#{?$IS_COPY_MODE,$COPY_MODE_LEFT$COPY_MODE_CENTER$COPY_MODE_RIGHT,#{?synchronize-panes,#[bold#,fg=black#,bg=$COLOR_YELLOW] SYNC #[default],}}"

# Mode
set-option -g mode-style "fg=$COLOR_BLACK,bg=yellow,bold"

set-option -g message-style "fg=default,bg=default,fill=$COLOR_BASE"
set-option -g message-command-style "fg=default,bg=$COLOR_MESSAGE_BG,fill=$COLOR_MESSAGE_BG"

# Clock
set-option -g clock-mode-colour green

#------------------------------------------------------------------------------
#-- Plugins -------------------------------------------------------------------
#------------------------------------------------------------------------------

set-environment -g -F TMUX_PLUGIN_MANAGER_PATH "${XDG_DATA_HOME}/tmux/plugins"

set -g @plugin "tmux-plugins/tpm"

# Auto-install TPM (+ plugins) on a fresh machine
if "test ! -d ${XDG_DATA_HOME}/tmux/plugins/tpm" {
  run "git clone --depth 1 https://github.com/tmux-plugins/tpm ${XDG_DATA_HOME}/tmux/plugins/tpm && ${XDG_DATA_HOME}/tmux/plugins/tpm/bin/install_plugins"
}

set -g @plugin "laktak/extrakto"
set -g @extrakto_popup_size "50%"
set -g @extrakto_grab_area "window 500"
set -g @extrakto_fzf_unset_default_opts "false"
set -g @extrakto_clip_tool_run "tmux_osc52"

set -g @plugin "roosta/tmux-fuzzback"
set -g @fuzzback-bind "/"
set -g @fuzzback-fzf-colors "fg:$COLOR_OVERLAY2,fg+:-1,bg:-1,bg+:$COLOR_FUZZBACK_BG,gutter:$COLOR_SURFACE0,hl:bold:-1,hl+:-1,info:-1,prompt:-1,marker:3,header:2,pointer:3,border:$COLOR_OVERLAY2"
set -g @fuzzback-hide-preview 1
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size "75%"

run "$XDG_DATA_HOME/tmux/plugins/tpm/tpm"
